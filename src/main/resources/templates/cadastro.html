<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cadastro — Projeto Libelle</title>

    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="shortcut icon" th:href="@{/img/favicon.png}" type="image/x-icon">

    <link rel="stylesheet" th:href="@{/css/acervo.css}">
    <link rel="stylesheet" th:href="@{/css/templates.css}">
    <link rel="stylesheet" th:href="@{/css/cadastro.css}">
</head>

<body>

    <!-- Navbar -->
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <!-- ================= CADASTRO ================= -->
    <section class="cadastro-section">

        <div class="cadastro-container">
            <h1>Criar Conta</h1>
            <p class="cadastro-subtitulo">
                Faça parte da preservação do Hunsrückisch
            </p>

            <form th:action="@{/usuario/cadastrar}"
                  th:object="${usuario}"
                  method="post"
                  class="cadastro-form">

                <div class="form-group">
                    <label>Nome Completo</label>
                    <input type="text" th:field="*{nomeCompleto}" required>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" th:field="*{email}" required>
                </div>

                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" th:field="*{senhaHash}" required>
                </div>

                <div class="form-group">
                    <label>Preferência Ortográfica</label>
                    <select th:field="*{preferenciaOrtografia.id}" required>
                        <option value="">Selecione...</option>
                        <option th:each="o : ${ortografias}"
                                th:value="${o.id}"
                                th:text="${o.nomeSistema}">
                        </option>
                    </select>
                </div>

                <input type="text"
                    id="cidade"
                    th:field="*{localidade.cidade}"
                    placeholder="Cidade">

                <input type="text"
                    id="estado"
                    th:field="*{localidade.estado}"
                    placeholder="Estado">

                    <input type="hidden" id="latitude" th:field="*{localidade.latitude}">
                    <input type="hidden" id="longitude" th:field="*{localidade.longitude}">

                <button type="submit" class="btn-cadastro">
                    Criar Conta
                </button>

                <div th:if="${erro}" class="mensagem-erro">
                    <p th:text="${erro}"></p>
                </div>

                <div th:if="${param.sucesso}" class="mensagem-sucesso">
                    Conta criada com sucesso!
                </div>

            </form>
        </div>

    </section>
    <!-- ============================================ -->

    <!-- Login Modal -->
    <div th:replace="fragments/login :: loginModal"></div>

    <!-- Footer -->
    <div th:replace="fragments/footer :: footer"></div>

    <!-- Scripts -->
    <script th:src="@{/js/toggleSenha.js}"></script>
    <!-- Script localidade.cidade -->
    <script> 
        function validarLocalizacao() {

        let cidade = document.getElementById("cidade").value;
        let estado = document.getElementById("estado").value;

        if(!cidade || !estado){
            alert("Informe cidade e estado.");
            return false;
        }

        let url = `https://nominatim.openstreetmap.org/search?city=${cidade}&state=${estado}&country=Brazil&format=json`;

        fetch(url)
        .then(res => res.json())
        .then(data => {

            if(data.length > 0){

                document.getElementById("latitude").value = data[0].lat;
                document.getElementById("longitude").value = data[0].lon;

                document.querySelector(".cadastro-form").submit();

            }else{
                alert("Não foi possível encontrar essa cidade.");
            }

        });

        return false;
    }
    </script>

</body>
</html>
